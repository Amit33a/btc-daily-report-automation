services:
  postgres:
    image: postgres:16
    container_name: btc_progres
    restart: always
    environment:
      POSTGRES_USER: btc_user
      POSTGRES_PASSWORD: btc_password
      POSTGRES_DB: btc_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
